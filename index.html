<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">

</head>

<body>
 
  <div class="reel-page">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <button>
         <i class="bi bi-play-btn"></i>
      </button>
      <nav>
          <a href="#">Esplora</a>
          <a href="#" id="new">Seguiti</a>
          <a href="#" id="border">Per te</a>
       </nav>
       <button>
         <i class="bi bi-search"></i>
       </button>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
         <figure>
             <img src="assets/img/boolean_logo.png" alt="logo">
             <button class="circle">+</button>
         </figure>
         <div class="side-item">
             <button><i class="bi bi-heart-fill"></i></button>
             <span id="white">588</span>
         </div>
         <div class="side-item">
            <button><i class="bi bi-chat-dots-fill"></i></button>
             <span id="white"> 13</span>
         </div>
         <div class="side-item">
            <button><i class="bi bi-bookmark-fill"></i></button>
            <span id="white">638</span>
         </div>
         <div class="side-item">
            <button><i class="bi bi-sign-turn-slight-right-fill"></i></button>
            <span id="white">491</span>
         </div>
    </div>

    <!--Text above footer-->

    <div class="above-footer">
       <h2>boolean.careers</h2>
       <p>Prova il Fundamental Camp.20 ore di corso <br>
          gratuito per... Vedi altro 
       </p>
    </div>


    <!-- Footer -->
    <footer>
            <div class="nav-item">
                <button class="white">
                  <i class="bi bi-house-fill"></i>
                </button>
                  <span id="white">Home</span>
            </div>
            <div class="nav-item">
                <button>
                  <i class="bi bi-people"></i>
                </button>
                  <span>Amici</span>
            </div>
            <button id="add">+</button>   
            <div class="nav-item">
               <div class="badge">19</div>     
                <button>
                  <i class="bi bi-chat-square"></i> 
                </button>
                  <span>Posta in arrivo</span>
            </div>
            <div class="nav-item">
                <button>
                  <i class="bi bi-person"></i>
                </button>
                  <span>Profilo</span>
            </div>
    </footer>
  </div>
</body>
</html>
