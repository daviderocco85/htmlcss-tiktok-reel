<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
       <i class="bi bi-play-btn"></i>
       <h2>Esplora</h2>
       <i class="bi bi-plus-circle-fill"></i>
       <h2>Seguiti</h2>
       <h2 id="border">Per te</h2>
       <i class="bi bi-search"></i>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
         <figure>
             <img src="assets/img/boolean_logo.png" alt="logo">
             <i class="bi bi-plus-circle-fill"></i>
         </figure>
         <div class="side-item">
             <i class="bi bi-heart-fill"></i>
             <span id="white">588</span>
         </div>
         <div class="side-item">
            <i class="bi bi-chat-dots-fill"></i>
             <span id="white"> 13</span>
         </div>
         <div class="side-item">
            <i class="bi bi-bookmark-fill"></i>
            <span id="white" >638</span>
         </div>
         <div class="side-item">
            <i class="bi bi-sign-turn-slight-right-fill"></i>
            <span id="white">491</span>
         </div>
    </div>

    <!--Text above footer-->

    <div class="above-footer">
       <h2>boolean.careers</h2>
       <p>Prova il Fundamental Camp.20 ore di corso <br>
          gratuito per... Vedi altro 
       </p>
    </div>


    <!-- Footer -->
    <footer>
            <div class="nav-item">
                <i class="bi bi-house-fill"></i>
                  <span>Home</span>
            </div>
            <div class="nav-item">
                <i class="bi bi-people"></i>
                  <span id="gray">Amici</span>
            </div>
            <div class="icon-wrapper">
                <i class="bi bi-file-plus-fill"></i>    
            </div>
            <div class="nav-item">
               <div class="badge">19</div>     
                <i class="bi bi-chat-square"></i>
                  <span id="gray">Posta in arrivo</span>
            </div>
            <div class="nav-item">
                <i class="bi bi-person"></i>
                  <span id="gray">Profilo</span>
            </div>
    </footer>
  </div>

</body>

</html>
